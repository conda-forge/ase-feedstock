schema_version: 1

context:
  name: ase
  version: "3.28.0"
  sha256: 74fe77ca38bf78070e24cd283f5d25be129bad6503fd26619008548518144732
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: ${{ sha256 }}
  file_name: ${{ name }}-${{ version }}.tar.gz

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - ase=ase.cli.main:main
      - ase-db=ase.cli.main:old
      - ase-gui=ase.cli.main:old
      - ase-run=ase.cli.main:old
      - ase-info=ase.cli.main:old
      - ase-build=ase.cli.main:old

requirements:
  host:
    - python 3.10.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - matplotlib-base
    - numpy
    - scipy

tests:
  - python:
      imports:
        - ase
      pip_check: false
      python_version: ${{ python_min }}
  - requirements:
      run:
        - pytest
        - pytest-mock
        - python ${{ python_min }}.*
    script:
      - if: not win
        then: export DISPLAY=""
      - ase test

about:
  license: LGPL-2.1-or-later
  license_file: LICENSE
  summary: ASE is a python package providing an open source Atomic Simulation Environment in the Python language.
  description: |
    ASE is a set of tools and Python modules for setting up,
    manipulating, running, visualizing and analyzing atomistic simulations.
    Python 3.5+
  homepage: https://gitlab.com/ase/ase
  repository: https://gitlab.com/ase/ase
  documentation: http://wiki.fysik.dtu.dk/ase

extra:
  recipe-maintainers:
    - jochym
    - CJ-Wright
    - jan-janssen
